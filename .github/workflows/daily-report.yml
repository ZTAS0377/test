name: Daily Commit Report (Testing)

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (for testing)
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Generate Commit Report (CSV)
        run: |
          echo "Developer,Repository,Branch,Commit Message" > report.csv
          git log --since="midnight" --pretty=format:'%an,%D,%s' >> report.csv

      - name: Send Email with Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "📊 Commit Report (Testing) - ${{ github.repository }}"
          to: ${{ secrets.TO_EMAIL }}
          from: GitHub Actions <${{ secrets.SMTP_USERNAME }}>
          attachments: report.csv
          body: |
            Hello,

            This is a TEST commit report (runs every 5 minutes).

            📦 Repository: ${{ github.repository }}
            📅 Today's Commits Included
            ⏱ Generated At: $(date)

            Please find the attached CSV report.

            Regards,
            GitHub Actions
